name: Docker Publish

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  publish-frontend:
    name: Publish frontend image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract frontend image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/domilix-frontend
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./domilix.com
          file: ./domilix.com/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-backend:
    name: Publish backend image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract backend image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/domilix-backend
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  prepare-deploy:
    name: Prepare deploy files
    runs-on: ubuntu-latest
    needs:
      - publish-frontend
      - publish-backend
    if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'master')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure deploy directory exists
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: domilix.com
          username: root
          key: ${{ secrets.VPS_SSH }}
          script: mkdir -p /opt/domilix/deploy

      - name: Upload deploy files
        uses: burnett01/rsync-deployments@7.0.2
        with:
          switches: -avzr --delete --exclude=.env.production
          path: deploy/
          remote_path: /opt/domilix/deploy/
          remote_host: domilix.com
          remote_user: root
          remote_key: ${{ secrets.VPS_SSH }}

  deploy-frontend:
    name: Deploy Frontend Service
    runs-on: ubuntu-latest
    needs: prepare-deploy
    steps:
      - name: Deploy frontend compose
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: domilix.com
          username: root
          key: ${{ secrets.VPS_SSH }}
          script: |
            set -e
            cd /opt/domilix

            GHCR_USER="${{ secrets.GHCR_USERNAME }}"
            GHCR_PASS="${{ secrets.GHCR_TOKEN }}"

            if [ -z "$GHCR_USER" ] || [ -z "$GHCR_PASS" ]; then
              GHCR_USER="${{ github.actor }}"
              GHCR_PASS="${{ secrets.GITHUB_TOKEN }}"
              echo "Using GitHub Actions token for GHCR login"
            fi

            echo "$GHCR_PASS" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            if [ ! -f deploy/.env.production ]; then
              cp deploy/.env.production.example deploy/.env.production
              echo "deploy/.env.production created from example. Update it with real values."
            fi

            FRONTEND_IMAGE="ghcr.io/${{ github.repository_owner }}/domilix-frontend:${{ github.ref_name }}"
            echo "Deploying frontend image: ${FRONTEND_IMAGE}"

            FRONTEND_IMAGE="$FRONTEND_IMAGE" docker compose -p domilix_frontend --env-file deploy/.env.production -f deploy/docker-compose.domilix.com.yml pull frontend
            FRONTEND_IMAGE="$FRONTEND_IMAGE" docker compose -p domilix_frontend --env-file deploy/.env.production -f deploy/docker-compose.domilix.com.yml up -d --remove-orphans frontend

  deploy-backend:
    name: Deploy Backend Service
    runs-on: ubuntu-latest
    needs: prepare-deploy
    steps:
      - name: Deploy backend compose
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: domilix.com
          username: root
          key: ${{ secrets.VPS_SSH }}
          script: |
            set -e
            cd /opt/domilix

            GHCR_USER="${{ secrets.GHCR_USERNAME }}"
            GHCR_PASS="${{ secrets.GHCR_TOKEN }}"

            if [ -z "$GHCR_USER" ] || [ -z "$GHCR_PASS" ]; then
              GHCR_USER="${{ github.actor }}"
              GHCR_PASS="${{ secrets.GITHUB_TOKEN }}"
              echo "Using GitHub Actions token for GHCR login"
            fi

            echo "$GHCR_PASS" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            if [ ! -f deploy/.env.production ]; then
              cp deploy/.env.production.example deploy/.env.production
              echo "deploy/.env.production created from example. Update it with real values."
            fi

            BACKEND_IMAGE="ghcr.io/${{ github.repository_owner }}/domilix-backend:${{ github.ref_name }}"
            echo "Deploying backend image: ${BACKEND_IMAGE}"

            BACKEND_IMAGE="$BACKEND_IMAGE" docker compose -p domilix_backend --env-file deploy/.env.production -f deploy/docker-compose.api.domilix.com.yml pull backend
            BACKEND_IMAGE="$BACKEND_IMAGE" docker compose -p domilix_backend --env-file deploy/.env.production -f deploy/docker-compose.api.domilix.com.yml up -d db

            echo "Synchronizing Prisma schema on the deployed backend"
            BACKEND_IMAGE="$BACKEND_IMAGE" docker compose -p domilix_backend --env-file deploy/.env.production -f deploy/docker-compose.api.domilix.com.yml run --rm backend pnpm prisma db push

            echo "Starting backend after Prisma sync"
            BACKEND_IMAGE="$BACKEND_IMAGE" docker compose -p domilix_backend --env-file deploy/.env.production -f deploy/docker-compose.api.domilix.com.yml up -d --remove-orphans backend

      - name: Optional post-deploy command
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: domilix.com
          username: root
          key: ${{ secrets.VPS_SSH }}
          script: |
            if [ -n "${{ secrets.POST_DEPLOY_CMD }}" ]; then
              ${{ secrets.POST_DEPLOY_CMD }}
            fi
