services:
  frontend:
    image: ${FRONTEND_IMAGE}
    container_name: domilix-frontend-dev
    restart: unless-stopped
    env_file:
      - ./.env.frontend
    networks:
      - traefik
    labels:
      - traefik.enable=true
      - traefik.docker.network=${TRAEFIK_NETWORK:-traefik}
      - traefik.http.routers.domilix-frontend-dev.rule=Host(`${DEV_FRONTEND_HOST:-new.domilix.com}`)
      - traefik.http.routers.domilix-frontend-dev.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}
      - traefik.http.routers.domilix-frontend-dev.tls=true
      - traefik.http.routers.domilix-frontend-dev.tls.certresolver=${TRAEFIK_CERTRESOLVER:-le}
      - traefik.http.services.domilix-frontend-dev.loadbalancer.server.port=3000

networks:
  traefik:
    external: true
    name: ${TRAEFIK_NETWORK:-traefik}
