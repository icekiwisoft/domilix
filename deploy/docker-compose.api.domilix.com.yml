services:
  backend:
    image: ${BACKEND_IMAGE}
    container_name: domilix-backend
    restart: unless-stopped
    env_file:
      - ./.env.production
    volumes:
      - domilix_backend_storage:/app/storage
    environment:
      PORT: 8000
      HTTP_REQUEST_TIMEOUT_MS: ${HTTP_REQUEST_TIMEOUT_MS:-900000}
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-too}
      MAPBOX_ACCESS_TOKEN: ${MAPBOX_ACCESS_TOKEN:-}
      WASABI_ACCESS_KEY_ID: ${WASABI_ACCESS_KEY_ID:-}
      WASABI_SECRET_ACCESS_KEY: ${WASABI_SECRET_ACCESS_KEY:-}
      WASABI_REGION: ${WASABI_REGION:-eu-west-2}
      WASABI_BUCKET: ${WASABI_BUCKET:-}
      WASABI_ENDPOINT: ${WASABI_ENDPOINT:-https://s3.eu-west-2.wasabisys.com}
      WASABI_PUBLIC_BASE_URL: ${WASABI_PUBLIC_BASE_URL:-}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app
      - traefik
    labels:
      - traefik.enable=true
      - traefik.docker.network=${TRAEFIK_NETWORK:-traefik}
      - traefik.http.routers.domilix-api.rule=Host(`${BACKEND_HOST:-api.domilix.com}`)
      - traefik.http.routers.domilix-api.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}
      - traefik.http.routers.domilix-api.tls=true
      - traefik.http.routers.domilix-api.tls.certresolver=${TRAEFIK_CERTRESOLVER:-le}
      - traefik.http.services.domilix-api.loadbalancer.server.port=8000

  db:
    image: mysql:8.0
    container_name: domilix-mysql
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - domilix_mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', '127.0.0.1', '-p${DB_ROOT_PASSWORD}']
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - app

networks:
  traefik:
    external: true
    name: ${TRAEFIK_NETWORK:-traefik}
  app:
    driver: bridge

volumes:
  domilix_mysql_data:
  domilix_backend_storage:
